<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Assistant - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .question {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .difficulty {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        
        .difficulty-1 { background: #28a745; color: white; }
        .difficulty-2 { background: #17a2b8; color: white; }
        .difficulty-3 { background: #ffc107; color: black; }
        
        input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .correct {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .wrong {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Learning Assistant</h1>
            <p>Adaptive Learning System Demo</p>
        </div>
        
        <div id="quizContainer" class="card">
            <div id="questionArea">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script>
